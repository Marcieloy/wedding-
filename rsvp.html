<div class="page-container">
    <div class="card-border"></div>
    <div class="page-content">
        <div class="sans-light">RSVP</div>
        <div class="script-title" style="font-size: 50px;">Kindly Respond</div>
        <p class="subtitle-italic" style="text-align: center;">Please confirm by July 10, 2026</p>

        <form id="rsvpForm" style="margin-top: 30px;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-group">
                <label>Number of Guests</label>
                <select id="numGuests" required>
                    <option value="1">1 Guest</option>
                    <option value="2">2 Guests</option>
                    <option value="3">3 Guests</option>
                </select>
            </div>

            <div class="form-group">
                <label>Will you be attending?</label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                        <input type="radio" name="attendance" value="yes" required> Joyfully Accepts
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                        <input type="radio" name="attendance" value="no" required> Regretfully Declines
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Names of Additional Guests</label>
                <textarea id="guestNames"></textarea>
            </div>

            <button type="submit" class="submit-btn">Send RSVP</button>
        </form>
    </div>
</div>
